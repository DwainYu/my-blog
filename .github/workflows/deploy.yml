name: Deploy to Cloudflare

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    name: Deploy to Cloudflare
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Deploy via Hook
        env:
          CF_DEPLOY_HOOK_URL: https://api.cloudflare.com/client/v4/workers/builds/deploy_hooks/cf6243b0-59b1-4460-84ac-4b8cd5679b63
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          curl -sf -X POST "$CF_DEPLOY_HOOK_URL" \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            -H "Content-Type: application/json"
